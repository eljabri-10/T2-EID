```html
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة المعايدة</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@600&display=swap" rel="stylesheet">

<style>

@font-face {
  font-family: 'GuessWhat';
  src: url('Guesswhat-Exceptional.woff2') format('woff2');
}

html, body{
  margin:0;
  padding:0;
  background:#f7f6da;
  font-family:'IBM Plex Sans Arabic', sans-serif;
  text-align:center;
}

.main-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:30px;
}

.company-logo{
  height:60px;
  margin-bottom:20px;
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:12px;
  max-width:400px;
  width:100%;
}

input,button{
  padding:15px;
  font-size:1.1rem;
  border-radius:6px;
  border:1px solid #ccc;
  text-align:center;
}

button{
  background:#269b55;
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#1f7e45;
}

.design-options{
  display:flex;
  justify-content:center;
  gap:10px;
}

.design-thumb{
  width:120px;
  border-radius:10px;
  cursor:pointer;
  border:3px solid transparent;
}

.design-thumb.selected{
  border-color:#269b55;
}

.hidden-container{
  position:absolute;
  top:-9999px;
  left:-9999px;
  width:1080px;
  height:1350px;
  background-size:cover;
  background-position:center;
}

.design1{
  background-image:url("https://i.imgur.com/dJF3xQ5.png");
}

.design2{
  background-image:url("https://i.imgur.com/hOSRxHw.png");
}

/* مكان الاسم */

.name{
  position:absolute;
  left:50%;
  top:565px;
  transform:translate(-50%,-50%);
  width:500px;
  text-align:center;
  font-family:'GuessWhat';
  font-size:32px;
  color:#f7f6da;
}

.image-preview{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:contain;
  background:rgba(0,0,0,0.85);
  z-index:9999;
}

</style>
</head>

<body>

<div class="main-container">

<img src="https://i.imgur.com/m4SOhEP.png" class="company-logo">

<h2>أدخل اسمك واختر تصميم المعايدة</h2>

<div class="input-group">

<input type="text" id="employeeName" placeholder="أدخل اسمك">

<div class="design-options">
<img src="https://i.imgur.com/dJF3xQ5.png" class="design-thumb selected" data-design="design1">
<img src="https://i.imgur.com/hOSRxHw.png" class="design-thumb" data-design="design2">
</div>

<button onclick="generateCard()">تحميل الصورة</button>

</div>
</div>

<div class="hidden-container design1" id="hiddenContainer">
<div class="name" id="nameDisplay">اسم الموظف</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

let selectedDesign="design1";

document.querySelectorAll('.design-thumb').forEach(img=>{
img.addEventListener('click',()=>{
document.querySelectorAll('.design-thumb').forEach(i=>i.classList.remove('selected'));
img.classList.add('selected');
selectedDesign=img.dataset.design;
});
});

function adjustFontSize(el,maxWidth){

let fontSize=40;
const min=14;
const ctx=document.createElement("canvas").getContext("2d");

while(fontSize>=min){
ctx.font=fontSize+"px GuessWhat";
if(ctx.measureText(el.textContent).width<=maxWidth) break;
fontSize--;
}

el.style.fontSize=fontSize+"px";

}

async function generateCard(){

const name=document.getElementById("employeeName").value.trim();

if(!name){
alert("الرجاء إدخال اسمك");
return;
}

const hidden=document.getElementById("hiddenContainer");
const nameDisplay=document.getElementById("nameDisplay");

hidden.className="hidden-container "+selectedDesign;

nameDisplay.textContent=name;

adjustFontSize(nameDisplay,480);

const canvas=await html2canvas(hidden,{
scale:3,
useCORS:true
});

const imgData=canvas.toDataURL("image/png");

const link=document.createElement("a");
link.download="eid_card_"+name+".png";
link.href=imgData;
link.click();

}

</script>

</body>
</html>
