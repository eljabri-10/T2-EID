<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة المعايدة</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@600&display=swap" rel="stylesheet">

<style>

@font-face {
  font-family: 'GuessWhat';
  src: url('Guesswhat-Exceptional.woff2') format('woff2');
}

html, body {
  margin:0;
  padding:0;
  background-color:#f7f6da;
  color:#000;
  font-family:'IBM Plex Sans Arabic', sans-serif;
  text-align:center;
}

.main-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:30px 10px;
}

.company-logo{
  height:60px;
  margin-bottom:20px;
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:10px;
  width:100%;
  max-width:400px;
}

input,button{
  padding:15px;
  font-size:1.2rem;
  border-radius:5px;
  border:1px solid #ccc;
  text-align:center;
}

button{
  background:#269b55;
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#1f7e45;
}

.design-options{
  display:flex;
  gap:10px;
  justify-content:center;
}

.design-thumb{
  width:120px;
  cursor:pointer;
  border:3px solid transparent;
  border-radius:10px;
}

.design-thumb.selected{
  border-color:#269b55;
  box-shadow:0 0 10px #269b55;
}

.hidden-container{
  position:absolute;
  top:-9999px;
  left:-9999px;
  width:1080px;
  height:1350px;
  background-repeat:no-repeat;
  background-position:center;
  background-size:cover;
}

.design1{
  background-image:url('https://i.imgur.com/dJF3xQ5.png');
}

.design2{
  background-image:url('https://i.imgur.com/hOSRxHw.png');
}

/* الاسم يظهر داخل الخانة الخضراء */
.name{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  top: 820px;           /* الخانة الخضراء تقريباً عند 61% من الارتفاع */
  color:#f7f6da;        /* لون بيج */
  font-family:'GuessWhat', sans-serif;
  font-weight:400;
  font-size:38px;       /* حجم أكبر ليملأ الخانة */
  width:520px;          /* عرض يناسب الخانة الخضراء */
  max-width:520px;
  text-align:center;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
}

.image-preview{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:contain;
  background:rgba(0,0,0,0.8);
  z-index:1000;
}

</style>
</head>

<body>

<div class="main-container">

<img src="https://i.imgur.com/m4SOhEP.png" class="company-logo">

<h2>أدخل اسمك واختر تصميم المعايدة</h2>

<div class="input-group">

<input type="text" id="employeeName" placeholder="أدخل اسمك">

<div class="design-options">
<img src="https://i.imgur.com/dJF3xQ5.png" class="design-thumb selected" data-design="design1">
<img src="https://i.imgur.com/hOSRxHw.png" class="design-thumb" data-design="design2">
</div>

<button onclick="generateCard()">تحميل الصورة</button>

</div>
</div>

<div class="hidden-container design1" id="hiddenContainer">
<div class="name" id="nameDisplay">اسم الموظف</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

let selectedDesign="design1";

document.querySelectorAll('.design-thumb').forEach(img=>{
img.addEventListener('click',()=>{
document.querySelectorAll('.design-thumb').forEach(i=>i.classList.remove('selected'));
img.classList.add('selected');
selectedDesign=img.dataset.design;
});
});

function preloadImage(url){
return new Promise((resolve,reject)=>{
const img=new Image();
img.crossOrigin="Anonymous";
img.onload=()=>resolve(img);
img.onerror=()=>reject();
img.src=url;
});
}

function adjustFontSize(element, maxWidth){
  let fontSize = 42;
  const minFontSize = 18;
  const context = document.createElement("canvas").getContext("2d");

  while(fontSize >= minFontSize){
    context.font = `400 ${fontSize}px GuessWhat`;
    const textWidth = context.measureText(element.textContent).width;
    if(textWidth <= maxWidth) break;
    fontSize -= 2;
  }

  element.style.fontSize = fontSize + 'px';
}

async function generateCard(){

const nameValue=document.getElementById("employeeName").value.trim();

if(!nameValue){
alert("الرجاء إدخال اسمك!");
return;
}

const hiddenContainer=document.getElementById("hiddenContainer");
const nameDisplay=document.getElementById("nameDisplay");

hiddenContainer.className='hidden-container '+selectedDesign;
nameDisplay.textContent=nameValue;

adjustFontSize(nameDisplay, 500);

const imageUrls={
design1:'https://i.imgur.com/dJF3xQ5.png',
design2:'https://i.imgur.com/hOSRxHw.png'
};

try{

await preloadImage(imageUrls[selectedDesign]);

const canvas=await html2canvas(hiddenContainer,{
scale:3,
useCORS:true,
allowTaint:true,
backgroundColor:null
});

const imgData=canvas.toDataURL("image/png");

const link=document.createElement('a');
link.download=`معايدة_${nameValue}.png`;
link.href=imgData;
link.click();

}catch(error){
alert("حدث خطأ أثناء إنشاء الصورة");
}

}

</script>

</body>
</html>
